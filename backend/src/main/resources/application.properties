spring.application.name=freddan-backend

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:file:./freddan-db;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=freddan123
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Server
server.port=8080

# Twilio (WhatsApp) - Fill these after account creation
twilio.account.sid=${TWILIO_ACCOUNT_SID:}
twilio.auth.token=${TWILIO_AUTH_TOKEN:}
twilio.whatsapp.from=${TWILIO_WHATSAPP_FROM:whatsapp:+14155238886}

# Fast2SMS - Fill this after account creation
fast2sms.api.key=${FAST2SMS_API_KEY:}

# Shop Contact
shop.phone=${SHOP_PHONE:8608227548}

# Logging
logging.level.com.freddan=INFO
